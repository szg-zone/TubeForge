<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TubeForge - Login / Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-page { min-height: 100vh; background: var(--bg); padding: 100px 20px 40px; display: flex; align-items: center; justify-content: center; }
    .login-container { width: 100%; max-width: 420px; }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header h1 { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    .login-header p { color: var(--muted); font-size: 14px; }
    
    .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
    .login-toggle { display: flex; gap: 12px; margin-bottom: 24px; }
    .login-toggle button { flex: 1; padding: 14px; border-radius: 10px; background: var(--bg3); color: var(--muted2); font-size: 15px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
    .login-toggle button.active { background: var(--red); color: #fff; border-color: var(--red); }
    
    .login-form .form-group { margin-bottom: 16px; }
    .login-form .form-group label { display: block; font-size: 13px; color: var(--muted2); margin-bottom: 6px; }
    .login-form .form-group input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px; padding: 14px; font-size: 15px; color: var(--text2); }
    .login-form .form-group input:focus { outline: none; border-color: var(--red); }
    
    .login-form .submit-btn { width: 100%; padding: 16px; border-radius: 10px; background: var(--red); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; border: none; margin-top: 8px; }
    .login-form .submit-btn:hover { opacity: 0.9; }
    
    .login-form .forgot-link { text-align: right; margin-top: 8px; }
    .login-form .forgot-link a { font-size: 13px; color: var(--muted); }
    
    .login-form .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
    .login-form .divider::before, .login-form .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .login-form .divider span { font-size: 13px; color: var(--muted); }
    
    .login-form .oauth-btns { display: flex; gap: 12px; }
    .login-form .oauth-btn { flex: 1; padding: 12px; border-radius: 10px; background: var(--bg3); color: var(--text2); font-size: 14px; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .login-form .oauth-btn:hover { background: var(--bg4); }
    
    .login-error { background: rgba(255,0,0,0.15); border: 1px solid var(--red); border-radius: 8px; padding: 12px; color: var(--red); font-size: 13px; text-align: center; margin-top: 12px; display: none; }
    .login-error.show { display: block; }
    
    .login-success { background: rgba(0,201,122,0.15); border: 1px solid var(--green); border-radius: 8px; padding: 12px; color: var(--green); font-size: 13px; text-align: center; margin-top: 12px; display: none; }
    .login-success.show { display: block; }
  </style>
</head>
<body>

<nav style="position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 32px;background:rgba(9,9,11,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);">
  <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:20px;">
    <div class="logo-icon" style="width:32px;height:32px;border-radius:8px;background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.2 6 3 11l-.9-2.4c-.3-.8.1-1.7.9-2l1-.3"/><path d="m20.2 6-1.7 4.3"/><path d="M6.2 5.8 5 9.1"/><path d="M12 3.9 10.5 8"/><path d="m18.2 3.5-1.5 4"/><rect x="2" y="11" width="20" height="11" rx="2"/></svg>
    </div>
    TubeForge
  </div>
</nav>

<div class="login-page">
  <div class="login-container">
    <div class="login-header">
      <h1>Welcome Back</h1>
      <p>Login or sign up to continue</p>
    </div>
    
    <div class="login-card">
      <div class="login-toggle">
        <button id="loginTab" class="active" onclick="showLogin()">Login</button>
        <button id="signupTab" onclick="showSignup()">Sign Up</button>
      </div>
      
      <!-- Login Form -->
      <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required />
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required />
        </div>
        
        <button type="submit" class="submit-btn">Login</button>
        
        <div class="forgot-link">
          <a href="#" onclick="alert('Password reset link sent to your email!'); return false;">Forgot password?</a>
        </div>
      </form>
      
      <!-- Sign Up Form -->
      <form class="login-form" id="signupForm" style="display:none;" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your name" required />
        </div>
        
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" required />
        </div>
        
        <div class="form-group">
          <label>Create Password</label>
          <input type="password" id="signupPassword" placeholder="Create password (min 6 chars)" required minlength="6" />
        </div>
        
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirm" placeholder="Confirm password" required />
        </div>
        
        <button type="submit" class="submit-btn">Create Account</button>
      </form>
      
      <div class="login-error" id="loginError"></div>
      <div class="login-success" id="loginSuccess"></div>
    </div>
  </div>
</div>

<script>
let isLoginMode = true;

// Check if already logged in
document.addEventListener('DOMContentLoaded', function() {
  const user = localStorage.getItem('tubeforge_user');
  if (user) {
    const userData = JSON.parse(user);
    if (userData.email) {
      // Already logged in, redirect to app
      window.location.href = 'index.html';
    }
  }
});

function showLogin() {
  isLoginMode = true;
  document.getElementById('loginTab').classList.add('active');
  document.getElementById('signupTab').classList.remove('active');
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('signupForm').style.display = 'none';
  hideMessages();
}

function showSignup() {
  isLoginMode = false;
  document.getElementById('loginTab').classList.remove('active');
  document.getElementById('signupTab').classList.add('active');
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
  hideMessages();
}

function hideMessages() {
  document.getElementById('loginError').classList.remove('show');
  document.getElementById('loginSuccess').classList.remove('show');
}

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('loginSuccess').classList.remove('show');
}

function showSuccess(msg) {
  const el = document.getElementById('loginSuccess');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('loginError').classList.remove('show');
}

function handleLogin(e) {
  e.preventDefault();
  hideMessages();
  
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if (!email || !email.includes('@')) {
    showError('Please enter a valid email');
    return;
  }
  
  if (!password || password.length < 6) {
    showError('Password must be at least 6 characters');
    return;
  }
  
  // Simple local storage authentication
  const users = JSON.parse(localStorage.getItem('tubeforge_users') || '[]');
  const user = users.find(u => u.email === email && u.password === password);
  
  if (user) {
    // Save current user
    localStorage.setItem('tubeforge_user', JSON.stringify(user));
    localStorage.setItem('tubeforge_email', email);
    showSuccess('Login successful! Redirecting...');
    setTimeout(function() {
      window.location.href = 'index.html';
    }, 1000);
  } else {
    showError('Invalid email or password. Please sign up first.');
  }
}

function handleSignup(e) {
  e.preventDefault();
  hideMessages();
  
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const confirm = document.getElementById('signupConfirm').value;
  
  if (!name) {
    showError('Please enter your name');
    return;
  }
  
  if (!email || !email.includes('@')) {
    showError('Please enter a valid email');
    return;
  }
  
  if (!password || password.length < 6) {
    showError('Password must be at least 6 characters');
    return;
  }
  
  if (password !== confirm) {
    showError('Passwords do not match');
    return;
  }
  
  // Check if user exists
  const users = JSON.parse(localStorage.getItem('tubeforge_users') || '[]');
  if (users.find(u => u.email === email)) {
    showError('Email already registered. Please login.');
    return;
  }
  
  // Create new user
  const newUser = { name, email, password, plan: 'free', created: new Date().toISOString() };
  users.push(newUser);
  localStorage.setItem('tubeforge_users', JSON.stringify(users));
  
  // Auto login
  localStorage.setItem('tubeforge_user', JSON.stringify(newUser));
  localStorage.setItem('tubeforge_email', email);
  
  showSuccess('Account created! Redirecting...');
  setTimeout(function() {
    window.location.href = 'index.html';
  }, 1000);
}
</script>
</body>
</html>
