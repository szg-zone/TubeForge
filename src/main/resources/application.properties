server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}

# PostgreSQL Database (Railway) - uses DATABASE_URL env var
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# NVIDIA API (Text-to-Text AI) - Set via environment variables
nvidia.api.key=${NVIDIA_API_KEY}
nvidia.api.url=${NVIDIA_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
nvidia.model=${NVIDIA_MODEL:qwen/qwen3-next-80b-a3b-instruct}
nvidia.max-tokens=${NVIDIA_MAX_TOKENS:4096}
nvidia.temperature=${NVIDIA_TEMPERATURE:0.6}
nvidia.top_p=${NVIDIA_TOP_P:0.7}

# Picsart API (Image Generation) - Set via environment variables
picsart.api.key=${PICSART_API_KEY}

# Spring configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
