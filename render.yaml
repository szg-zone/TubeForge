services:
  - type: web
    name: tubeforge
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/tubeforge-*.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: NVIDIA_API_KEY
        sync: false
      - key: PICSART_API_KEY
        sync: false
      - key: SERVER_PORT
        value: 8080
    autoDeploy: true